apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: autoscale
  labels:
    app: nginx-deployment
spec:
  selector:
    app: nginx-deployment
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: metrics
      port: 9113
      targetPort: 9113
      protocol: TCP
