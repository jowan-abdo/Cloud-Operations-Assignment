apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-stubstatus-config
  namespace: autoscale
data:
  default.conf: |
    server {
      listen 80;
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
    }

    server {
      listen 8080;
      location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
      }
    }
